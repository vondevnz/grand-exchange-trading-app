name: Keep Render backend awake

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: curl -sf https://grand-exchange-trading-app.onrender.com/api/prices/latest?page=1&page_size=1 || echo "Ping failed, but not blocking"